name: Publish to npm on push to main

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'

jobs:
  release:
    name: Publish to npm
    permissions:
      contents: write
      id-token: write
    uses: Informasjonsforvaltning/workflows/.github/workflows/release-npm.yaml@main
    secrets:
      BOT_ACCESS_TOKEN: ${{ secrets.BOT_ACCESS_TOKEN }}
